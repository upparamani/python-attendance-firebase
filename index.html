<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Attendance System V6</title>
<link rel="stylesheet" href="style.css">
<style>
#toastBox{
  position:fixed;top:28px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:none;
}
.toast{
  min-width:220px;padding:14px 26px;border-radius:14px;
  font-size:1.15rem;font-weight:700;text-align:center;letter-spacing:0.3px;
  box-shadow:0 8px 28px rgba(0,0,0,0.32);
  opacity:0;transform:translateY(-16px) scale(0.93);
  transition:opacity 0.28s ease,transform 0.28s ease;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0) scale(1);}
.toast.t-success{background:#00c97a;color:#fff;}
.toast.t-error  {background:#ff4466;color:#fff;}
.toast.t-info   {background:#2E6DA4;color:#fff;}
</style>
<script src="students.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>
<div id="toastBox"></div>

<header>
<h2>KLS Gogte Institute of Technology</h2>
ISE Department · Attendance System
</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <div class="card hidden" id="profcard">
    <h2>Professor</h2>
    <button class="green" onclick="showProfessor()">Open Dashboard</button>
  </div>
  <div class="card">
    <h3>Student</h3>
    <button class="blue" onclick="showStudent()">Mark Attendance</button>
  </div>
</div>

<!-- STUDENT -->
<div id="student" class="hidden">
  <div class="card">
    <h3>Student Attendance</h3>
    <!-- FIX: id="usnInput" avoids conflict with variable names -->
    <input id="usnInput" placeholder="Enter USN" style="text-transform:uppercase" oninput="previewName()">
    <div id="namePreview" style="color:#00e5ff;margin-bottom:10px"></div>
    <!-- FIX: id="tokenInput" avoids conflict with local variable 'token' in openSession() -->
    <input id="tokenInput" placeholder="4 digit token"><br>
    <button id="submitBtn" class="green" onclick="submitAttendance()">Submit</button>
    <div id="result"></div>
  </div>
</div>

<!-- PROFESSOR -->
<div id="prof" class="hidden">
  <div class="card">
    <h3>Professor Dashboard</h3>
    Date: <input type="date" id="datePicker"><br>
    <select id="period">
      <option>P1</option>
      <option>P2</option>
    </select><br>
    <button id="openBtn" class="green" onclick="openSession()">Open</button>
    <button class="red" onclick="closeSession()">Close</button>
    <button class="blue" onclick="pauseSession()">Pause</button>
    <button class="green" onclick="resumeSession()">Resume</button>
    <!-- FIX: id="statusDisplay" avoids conflict with window.status -->
    <h2 id="statusDisplay" style="padding:10px;border-radius:8px;display:inline-block;">CLOSED</h2>
    <div class="token" id="tokenDisplay"></div>
    <div id="timer"></div>
    <div id="count"></div>
  </div>

  <div class="card">
    <h3>Live Attendance</h3>
    <!-- FIX: id="attendTable" avoids conflict with HTMLElement 'table' -->
    <table id="attendTable">
      <tr><th>USN</th><th>Name</th><th>Time</th></tr>
    </table>
  </div>

  <div class="card">
    <h3>Students Not Marked Yet</h3>
    <table id="absentTable">
      <tr><th>USN</th><th>Name</th></tr>
    </table>
  </div>

  <div class="card">
    <button onclick="exportExcel()">Export Excel</button>
  </div>

  <button onclick="goHome()">Exit</button>
</div>

</div><!-- .container -->

<script>

const BIN_ID="69c6943fc3097a1dd567cf54";
const API_KEY="$2a$10$0r2BZmxFrzU01uqwZWEyeuWkt1cugfUAo3I4ze0RlCRsyjNXZEuFW";
const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

let timerInterval;
let pollInterval;
let paused=false;

function getEl(id){ return document.getElementById(id); }

function showToast(msg, type="t-info", duration=2800){
  let t=document.createElement("div");
  t.className="toast "+type;
  t.innerHTML=msg;
  getEl("toastBox").appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add("show")));
  setTimeout(()=>{
    t.classList.remove("show");
    setTimeout(()=>t.remove(), 320);
  }, duration);
}

function findStudent(usnVal){
  return STUDENTS.find(s=>s.id===usnVal);
}

async function apiGet(){
  let r=await fetch(BASE+"/latest",{headers:{'X-Master-Key':API_KEY}});
  let j=await r.json();
  return j.record;
}

async function apiPut(data){
  await fetch(BASE,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body:JSON.stringify(data)
  });
}

// FIX: uses id="statusDisplay" — no conflict with window.status
function updateStatusUI(state){
  let el=getEl("statusDisplay");
  if(state==="OPEN"){
    el.innerText="OPEN"; el.style.background="#00aa66";
  }else if(state==="PAUSED"){
    el.innerText="PAUSED"; el.style.background="#ffaa00";
  }else{
    el.innerText="CLOSED"; el.style.background="#ff4466";
  }
}

function hideAll(){
  getEl("login").style.display="none";
  getEl("student").style.display="none";
  getEl("prof").style.display="none";
}

function showStudent(){
  hideAll();
  getEl("student").style.display="block";
}

async function showProfessor(){
  hideAll();
  getEl("prof").style.display="block";
  getEl("datePicker").value=new Date().toISOString().slice(0,10);

  // FIX: clear stale intervals before starting new ones
  clearInterval(timerInterval);
  clearInterval(pollInterval);

  let data=await apiGet();

  if(data && data.activeSession){
    paused=data.activeSession.paused||false;
    updateStatusUI(paused?"PAUSED":"OPEN");
    getEl("tokenDisplay").innerText=data.activeSession.token;
    getEl("openBtn").disabled=true;
    // FIX: restart timer when professor re-opens dashboard mid-session
    startTimer();
    startPolling();
  }else{
    updateStatusUI("CLOSED");
  }
}

// FIX: goHome() clears intervals so timer/poll don't run in background
function goHome(){
  clearInterval(timerInterval);
  clearInterval(pollInterval);
  hideAll();
  getEl("login").style.display="block";
}

function previewName(){
  let val=getEl("usnInput").value.trim().toUpperCase();
  let stu=findStudent(val);
  getEl("namePreview").innerText=stu?stu.name:"";
}

function randomToken(){
  return Math.floor(1000+Math.random()*9000);
}

async function openSession(){
  let data=await apiGet();

  if(data && data.activeSession){
    alert("Already Open"); return;
  }

  // FIX: named activeToken — no conflict with id="tokenInput"
  let activeToken=randomToken();

  if(!data) data={sessions:[],activeSession:null};

  data.activeSession={
    token:activeToken,
    date:getEl("datePicker").value||new Date().toISOString().slice(0,10),
    period:getEl("period").value,
    present:[],
    times:{},
    paused:false
  };

  await apiPut(data);

  paused=false;
  getEl("tokenDisplay").innerText=activeToken;
  updateStatusUI("OPEN");
  getEl("openBtn").disabled=true;

  // FIX: clear old intervals before starting fresh
  clearInterval(timerInterval);
  clearInterval(pollInterval);

  startTimer();
  startPolling();
  lastPresentCount=0;
}

function startTimer(){
  let remaining=300;
  updateTimerDisplay(remaining);
  timerInterval=setInterval(()=>{
    if(paused) return;
    remaining--;
    updateTimerDisplay(remaining);
    if(remaining<=0) closeSession();
  },1000);
}

function updateTimerDisplay(remaining){
  let m=Math.floor(remaining/60);
  let s=remaining%60;
  if(s<10) s="0"+s;
  getEl("timer").innerText="Time Remaining "+m+":"+s;
}

function startPolling(){
  pollInterval=setInterval(loadTable,2000);
}

async function pauseSession(){
  paused=true;
  let data=await apiGet();
  if(!data.activeSession) return;
  data.activeSession.paused=true;
  await apiPut(data);
  updateStatusUI("PAUSED");
}

async function resumeSession(){
  paused=false;
  let data=await apiGet();
  if(!data.activeSession) return;
  data.activeSession.paused=false;
  await apiPut(data);
  updateStatusUI("OPEN");
}

async function closeSession(){
  let data=await apiGet();

  if(data && data.activeSession){
    data.sessions=data.sessions||[];
    data.sessions.push(data.activeSession);
    data.activeSession=null;
    await apiPut(data);
  }

  clearInterval(timerInterval);
  clearInterval(pollInterval);

  updateStatusUI("CLOSED");
  getEl("openBtn").disabled=false;
  getEl("tokenDisplay").innerText="";
  getEl("timer").innerText="";
  getEl("count").innerText="";
}

let lastPresentCount=-1;

async function loadTable(){
  let data=await apiGet();
  if(!data) return;

  if(data.activeSession){
    updateStatusUI(data.activeSession.paused?"PAUSED":"OPEN");
  }else{
    updateStatusUI("CLOSED");
  }

  if(!data.activeSession){ lastPresentCount=-1; return; }

  let sess=data.activeSession;

  // FIX: attendTable instead of table
  getEl("attendTable").innerHTML="<tr><th>USN</th><th>Name</th><th>Time</th></tr>";
  getEl("absentTable").innerHTML="<tr><th>USN</th><th>Name</th></tr>";

  for(let u of sess.present){
    let stu=findStudent(u);
    getEl("attendTable").innerHTML+=`<tr><td>${u}</td><td>${stu?stu.name:""}</td><td>${sess.times[u]}</td></tr>`;
  }

  STUDENTS.forEach(s=>{
    if(!sess.present.includes(s.id)){
      getEl("absentTable").innerHTML+=`<tr><td>${s.id}</td><td>${s.name}</td></tr>`;
    }
  });

  getEl("count").innerHTML="Present: "+sess.present.length+" / "+STUDENTS.length;

  // Toast on professor screen when a new student marks attendance
  if(lastPresentCount>=0 && sess.present.length>lastPresentCount){
    let newUSN=sess.present[sess.present.length-1];
    let newStu=findStudent(newUSN);
    showToast("✓ "+( newStu?newStu.name:newUSN),"t-success",2500);
  }
  lastPresentCount=sess.present.length;
}

async function submitAttendance(){
  let usnVal=getEl("usnInput").value.trim().toUpperCase();
  let tokenVal=getEl("tokenInput").value.trim();

  let data=await apiGet();

  if(!data||!data.activeSession){
    getEl("result").innerText="Session Closed"; getEl("result").className="error"; return;
  }

  if(data.activeSession.paused){
    getEl("result").innerText="Session Paused"; getEl("result").className="error"; return;
  }

  // FIX: strict string comparison — token stored as number, input is string
  if(tokenVal!==String(data.activeSession.token)){
    getEl("result").innerText="Wrong Token ✗"; getEl("result").className="error"; return;
  }

  let stu=findStudent(usnVal);

  if(!stu){
    getEl("result").innerText="Invalid USN ✗"; getEl("result").className="error"; return;
  }

  if(data.activeSession.present.includes(usnVal)){
    getEl("result").innerText="Already Marked"; getEl("result").className="error"; return;
  }

  let now=new Date();
  let time=now.getHours()+":"+String(now.getMinutes()).padStart(2,'0');

  data.activeSession.present.push(usnVal);
  data.activeSession.times[usnVal]=time;

  await apiPut(data);

  getEl("result").innerHTML="✓ Marked<br>"+stu.name;
  getEl("result").className="success";

  let sb=getEl("submitBtn");
  sb.disabled=true;
  sb.style.background="#777";
  sb.innerText="Submitted";

  getEl("usnInput").style.display="none";
  getEl("tokenInput").style.display="none";
  getEl("namePreview").innerText="";
}

// ── exportExcel — styled header rows ────────────────────────────────────────
function exportExcel(){
  apiGet().then(data=>{

    let sessions=data.sessions||[];
    let totalCols=Math.max(5+sessions.length,5);

    // style presets
    const S_KLS={font:{name:"Arial",sz:18,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A3A5C"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_GIT={font:{name:"Arial",sz:13,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A3A5C"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_DEPT={font:{name:"Arial",sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"2E6DA4"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_COURSE={font:{name:"Arial",sz:11,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"2E6DA4"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_COLHDR={font:{name:"Arial",sz:10,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"34495E"}},alignment:{horizontal:"center",vertical:"center",wrapText:true}};
    const S_DATEHDR={font:{name:"Arial",sz:10,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"34495E"}},alignment:{horizontal:"center",vertical:"bottom",textRotation:90}};
    const S_DAYTOTAL={font:{name:"Arial",sz:10,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"7F8C8D"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_P={font:{name:"Arial",sz:10,bold:true,color:{rgb:"155724"}},fill:{fgColor:{rgb:"D4EDDA"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_A={font:{name:"Arial",sz:10,color:{rgb:"721C24"}},fill:{fgColor:{rgb:"F8D7DA"}},alignment:{horizontal:"center",vertical:"center"}};
    const S_DATA={font:{name:"Arial",sz:10},alignment:{horizontal:"center",vertical:"center"}};
    const S_NAME={font:{name:"Arial",sz:10},alignment:{horizontal:"left",vertical:"center"}};
    const S_NUM={font:{name:"Arial",sz:10,bold:true},alignment:{horizontal:"center",vertical:"center"}};
    const S_TS={font:{name:"Arial",sz:9,italic:true,color:{rgb:"888888"}},alignment:{horizontal:"right"}};

    let ws={};
    let merges=[];
    let R=0;

    function setCell(r,c,v,s){
      let addr=XLSX.utils.encode_cell({r,c});
      ws[addr]={v:v,t:"s",s:s};
    }
    function mergeRow(rowIdx){
      merges.push({s:{r:rowIdx,c:0},e:{r:rowIdx,c:totalCols-1}});
    }

    // Row 0 — KLS
    setCell(R,0,"KLS Gogte Institute of Technology",S_KLS);
    mergeRow(R); R++;

    // Row 1 — GIT
    setCell(R,0,"Gogte Institute of Technology, Belagavi",S_GIT);
    mergeRow(R); R++;

    // Row 2 — ISE Dept
    setCell(R,0,"Department of Information Science & Engineering",S_DEPT);
    mergeRow(R); R++;

    // Row 3 — Course
    setCell(R,0,"Python Programming  |  22IS444  |  2025 – 26",S_COURSE);
    mergeRow(R); R++;

    // Row 4 — spacer
    R++;

    // Row 5 — timestamp (right-aligned)
    setCell(R,totalCols-1,"Generated: "+new Date().toLocaleString(),S_TS);
    R++;

    // Row 6 — column headers (date cols rotated)
    let header=["Sl","USN","Name","Total","%"];
    sessions.forEach(s=>header.push(s.date+" "+s.period));
    header.forEach((h,c)=>setCell(R,c,h,c>=5?S_DATEHDR:S_COLHDR));
    R++;

    // Row 7 — day totals
    let dayTotals=["","","DAY TOTAL","",""];
    sessions.forEach(s=>dayTotals.push(s.present.length));
    dayTotals.forEach((v,c)=>setCell(R,c,v===0?"":v,c>=5?S_NUM:S_DAYTOTAL));
    R++;

    // Student rows
    STUDENTS.forEach((s,i)=>{
      let total=0;
      let rowVals=[i+1,s.id,s.name,0,0];
      let rowStyles=[S_DATA,S_DATA,S_NAME,S_NUM,S_NUM];
      sessions.forEach(sess=>{
        if(sess.present.includes(s.id)){
          rowVals.push("P"); rowStyles.push(S_P); total++;
        }else{
          rowVals.push("A"); rowStyles.push(S_A);
        }
      });
      rowVals[3]=total;
      rowVals[4]=sessions.length?Math.round(total*100/sessions.length):0;
      rowVals.forEach((v,c)=>setCell(R,c,v,rowStyles[c]));
      R++;
    });

    ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:R-1,c:totalCols-1}});
    ws["!merges"]=merges;
    ws["!rows"]=[{hpt:30},{hpt:22},{hpt:18},{hpt:18},{hpt:6},{hpt:14},{hpt:98},{hpt:18}]; // hpt:98 ≈ 130px for date header row

    let cols=[{wch:5},{wch:14},{wch:28},{wch:7},{wch:6}];
    sessions.forEach(()=>cols.push({wch:4}));  // ~30px for A/P columns
    ws["!cols"]=cols;

    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Attendance");
    XLSX.writeFile(wb,"Attendance.xlsx");
  });
}

document.addEventListener("DOMContentLoaded",()=>{
  let p=new URLSearchParams(location.search);
  if(p.get("prof")=="1") getEl("profcard").style.display="block";
});

</script>
</body>
</html>
