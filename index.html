<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">
<script src="students.js"></script>

</head>

<body>
<h2>Firebase Attendance System (Full Version)</h2>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW5K1tVyvllOJRxFG7SRlcrvIcis88ozw",
  authDomain: "python-22is444-attendance.firebaseapp.com",
  projectId: "python-22is444-attendance",
  storageBucket: "python-22is444-attendance.firebasestorage.app",
  messagingSenderId: "650103171454",
  appId: "1:650103171454:web:5f1e2cf8a273827589eb2f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function apiGet(){
  const ref = doc(db,"attendance","main");
  const snap = await getDoc(ref);
  return snap.exists()?snap.data():null;
}

async function apiPut(data){
  const ref = doc(db,"attendance","main");
  await setDoc(ref,data);
}

window.openSession = async function(){
  let token = Math.floor(1000+Math.random()*9000);
  let data = {
    activeSession:{
      token:token,
      present:[],
      times:{},
      paused:false
    },
    sessions:[]
  };
  await apiPut(data);
  alert("Session Opened. Token: "+token);
}

window.submitAttendance = async function(){
  let usn = prompt("Enter USN").toUpperCase();
  let token = prompt("Enter Token");

  let data = await apiGet();

  if(!data || !data.activeSession){
    alert("Session Closed"); return;
  }

  if(token != data.activeSession.token){
    alert("Wrong Token"); return;
  }

  if(data.activeSession.present.includes(usn)){
    alert("Already Marked"); return;
  }

  let time = new Date().toLocaleTimeString();

  data.activeSession.present.push(usn);
  data.activeSession.times[usn]=time;

  await apiPut(data);

  alert("Attendance Marked");
}
</script>

<button onclick="openSession()">Open Session</button>
<button onclick="submitAttendance()">Mark Attendance</button>

</body>
</html>
